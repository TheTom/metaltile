[files]
extend-exclude = []
ignore-hidden = true
ignore-files = true
ignore-dot = true
ignore-vcs = true
ignore-global = true
ignore-parent = true

[default]
binary = false
check-filename = true
check-file = true
unicode = true
ignore-hex = true
identifier-leading-digits = false
locale = "en"
extend-ignore-identifiers-re = []
extend-ignore-words-re = []
# Structural ignores — these generalise instead of enumerating every
# domain word, so the `extend-words` list below stops growing:
#  1. Inline-code spans (`mt_silu`, `qk_per_thread`) — code identifiers
#     in doc comments, never prose. Real doc-prose typos still caught.
#  2. Standalone all-caps acronyms of 2–5 chars (WHT, GQA, SDPA, FWHT,
#     …) — domain vocabulary. Capped at 5: a 6+ char all-caps token is
#     unusual for an acronym and worth checking. This is all-caps only,
#     so lowercase prose typos (`teh`, `wiht`, …) are never affected —
#     the only blind spot is a genuine ≤5-char fully-uppercase typo,
#     rare enough that skipping a per-acronym allowlist wins.
extend-ignore-re = [
    '`[^`\n]+`',
    '\b[A-Z][A-Z0-9]{1,4}\b',
]

[default.extend-identifiers]

# Weird syntax, but this how you ignore corrections for certain words.
[default.extend-words]
# DSL / IR op names
arange = "arange"
Arange = "Arange"
ARANGE = "ARANGE"
# MLX kernel suffix for non-Apple-Silicon variants
nax = "nax"
NAX = "NAX"
# Strided kernel suffix (e.g. copy_g_nd2)
nd = "nd"
Nd = "Nd"
# strat = "strat"
# froms = "froms"
thr = "thr"
THR = "THR"

[type.go]
extend-glob = []
extend-ignore-identifiers-re = []
extend-ignore-words-re = []
extend-ignore-re = []

[type.go.extend-identifiers]
flate = "flate"

[type.go.extend-words]

[type.sh]
extend-glob = []
extend-ignore-identifiers-re = []
extend-ignore-words-re = []
extend-ignore-re = []

[type.sh.extend-identifiers]
ot = "ot"
stap = "stap"

[type.sh.extend-words]

[type.py]
extend-glob = []
extend-ignore-identifiers-re = []
extend-ignore-words-re = []
extend-ignore-re = []

[type.py.extend-identifiers]
NDArray = "NDArray"
arange = "arange"
EOFError = "EOFError"

[type.py.extend-words]
