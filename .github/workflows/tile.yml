name: Tile

# Slow macOS job: `tile build` + `tile bench` together take ~5-6 min
# on the GitHub-hosted runner. Skip on PRs that can't affect kernel
# emission, dispatch, or measurement — docs-only PRs, baseline-JSON
# additions, README/CONTRIBUTING patches.
on:
  push:
    branches: [main, dev]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/tile.yml'
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/tile.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  # Needed so the bench-diff step can drop a comment on the PR. PRs
  # from forks still get the read-only token regardless — the step
  # handles that fallback explicitly.
  pull-requests: write

env:
  CLICOLOR: 1

jobs:
  tile:
    name: Tile
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0
      # rust-toolchain.toml pins nightly (edition=2024); the action installs
      # default but cargo will pick up the toml override automatically.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build
        run: cargo run --release -p metaltile-cli -- build

      # `--no-diff` because the next step renders the diff against the
      # committed baseline (rather than the in-tree one auto-diff would
      # pick on a PR that already modified its own baseline) and posts
      # it as a comment. `--allow-dirty` is defensive — CI checks out
      # clean, but a future codegen step could mutate a tracked file.
      - name: Bench
        run: |
          cargo run --release -p metaltile-cli -- bench -vv \
            --allow-dirty --no-diff --json /tmp/bench.json

      # Snapshot the raw bench JSON into the committed-baseline format
      # (`tile snap` envelope) and upload it as an artifact. snap runs
      # *on the runner* so the `device` field is the runner's real
      # chip — letting a maintainer download it and commit it as
      # `baselines/<chip-slug>.json` for a runner chip nobody owns
      # locally (e.g. the paravirtualized macOS runner). Also the first
      # building block for the auto-baseline workflow (issue #130).
      - name: Snapshot bench result
        run: |
          cargo run --release -q -p metaltile-cli -- snap \
            --from /tmp/bench.json -o /tmp/bench-snapshot.json \
            --note "CI runner capture @ ${{ github.sha }} (${{ github.ref_name }})"

      - name: Upload bench snapshot
        uses: actions/upload-artifact@v4
        with:
          name: bench-snapshot
          path: /tmp/bench-snapshot.json
          if-no-files-found: error

      # Soft signal: render `tile diff` against whatever baseline matches
      # the runner's chip slug and post it as a PR comment. Never fails
      # the job — the runner chip frequently won't match any committed
      # baseline, and reviewers want a glanceable trend, not a gate.
      - name: Bench diff
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          DEVICE_NAME=$(
            cargo run --release -q -p metaltile-cli -- device --json \
              | jq -r '.device'
          )
          # Same rule as `cmd::bench::chip_slug` in the Rust code:
          # lowercase, collapse non-alphanumeric runs to a single dash,
          # trim leading/trailing dashes.
          SLUG=$(printf '%s' "$DEVICE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
          BL="baselines/${SLUG}.json"
          echo "chip='${DEVICE_NAME}' slug='${SLUG}' baseline='${BL}'"

          {
            echo "<!-- bench-diff:${SLUG} -->"
            echo "### \`tile bench\` vs \`${BL}\`"
            echo
            echo "Runner chip: \`${DEVICE_NAME}\` (slug \`${SLUG}\`)"
            echo
            if [ ! -f "$BL" ]; then
              echo "_No committed baseline for this runner chip — skipping diff._"
              if ls baselines/*.json >/dev/null 2>&1; then
                echo
                echo "Available baselines: $(ls baselines/*.json | xargs -n1 basename | tr '\n' ' ')"
              fi
            else
              echo '```'
              # `|| true` so a regression exit code (1) doesn't kill the job.
              cargo run --release -q -p metaltile-cli -- diff \
                "$BL" /tmp/bench.json 2>&1 || true
              echo '```'
            fi
          } > /tmp/bench-diff-comment.md

          echo "---- bench-diff comment body ----"
          cat /tmp/bench-diff-comment.md
          echo "---- end bench-diff comment body ----"

          # Fork PRs get a read-only GITHUB_TOKEN regardless of the
          # `pull-requests: write` permission above — GitHub blocks
          # write tokens to mitigate untrusted-fork attacks. Log a
          # warning instead of failing the job; the comment body is
          # already in the step log right above.
          if ! gh pr comment "$PR_NUMBER" --body-file /tmp/bench-diff-comment.md; then
            echo "::warning::Could not post bench-diff comment (likely a fork PR with read-only token). Comment body is in this step log."
          fi
