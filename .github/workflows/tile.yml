name: Tile

# Cancel in-progress runs when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Job graph (all macOS runners):
#
#   changes
#   compile ──┬── build
#             ├── bench (ffai)  ──┐
#             └── bench (mlx)  ──┴── bench-merge
#
# `changes` (ubuntu, fast) classifies which paths changed so each bench
# shard only runs when its kernel family was the sole thing modified:
#   - ffai bench: only runs when crates/metaltile-std/src/ffai/** changed
#     AND no other crates or Rust-related files changed.
#   - mlx bench: same rule for crates/metaltile-std/src/mlx/**.
#   If other crates changed (core IR, codegen, …) neither shard runs — the
#   `build` job covers correctness for those changes.  Both shards run when
#   both families were touched (and nothing else).
#   On workflow_dispatch all shards always run regardless of file changes.
#
# `compile` builds the tile binary once (or restores it from the binary
# cache).  All downstream jobs download the pre-built artifact — no Rust
# toolchain or cargo invocation needed there.  Wall-clock time is dominated
# by the two bench shards (~20-25 min each); build and compile overlap with
# them so no runner sits idle.
#
# Skip on PRs that can't affect kernel emission, dispatch, or measurement —
# docs-only PRs, baseline-JSON additions, etc.
on:
  push:
    branches: [main, dev]
    paths:
      - 'crates/**/*.rs'
      - 'crates/**/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'tile.toml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'crates/**/*.rs'
      - 'crates/**/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'tile.toml'
      - '.github/workflows/tile.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  # Needed so the bench-diff step can drop a comment on the PR. PRs
  # from forks still get the read-only token regardless — the step
  # handles that fallback explicitly.
  pull-requests: write

env:
  CLICOLOR_FORCE: 1

jobs:
  # ── Job 0: detect which paths changed ────────────────────────────────────────
  # Fast ubuntu job: classifies changed files into three buckets so the bench
  # shards can be gated independently.  Uses dorny/paths-filter which compares
  # against the PR base (pull_request) or the previous push commit (push).
  # On workflow_dispatch there is no diff, so all outputs default to 'false';
  # the bench jobs override this with a workflow_dispatch bypass condition.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ffai: ${{ steps.filter.outputs.ffai }}
      mlx: ${{ steps.filter.outputs.mlx }}
      other: ${{ steps.filter.outputs.other }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            ffai:
              - 'crates/metaltile-std/src/ffai/**'
            mlx:
              - 'crates/metaltile-std/src/mlx/**'
            other:
              - 'crates/**/*.rs'
              - '!crates/metaltile-std/src/ffai/**'
              - '!crates/metaltile-std/src/mlx/**'
              - 'crates/**/Cargo.toml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'tile.toml'

  # ── Job 1: compile tile binary ───────────────────────────────────────────────
  # Builds `tile` once (or restores from binary cache) and uploads it as a
  # workflow artifact.  All other jobs download the artifact instead of
  # running cargo themselves — one build per workflow run, not one per job.
  compile:
    name: Compile
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      # Cache the compiled tile binary keyed on all Rust source inputs.
      # A cache hit skips `cargo build` entirely (~3-5 min saved).
      - name: Cache tile binary
        id: binary-cache
        uses: actions/cache@v4
        with:
          path: target/ci/tile
          key: tile-binary-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'crates/**/*.rs', 'rust-toolchain.toml') }}

      - uses: Swatinem/rust-cache@v2
        if: steps.binary-cache.outputs.cache-hit != 'true'
        with:
          shared-key: tile-macos
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build tile CLI
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: cargo build --profile ci -p metaltile-cli

      # Upload so every downstream job gets the binary without any cargo
      # invocation.  retention-days=1 keeps storage costs near zero.
      - name: Upload tile binary
        uses: actions/upload-artifact@v4
        with:
          name: tile-binary
          path: target/ci/tile
          if-no-files-found: error
          retention-days: 1

  # ── Job 2: compile-check all registered kernels ──────────────────────────────
  # Runs `tile build` (MSL codegen + xcrun compile-check for every kernel ×
  # dtype).  Overlaps with the bench shards so all three free macOS runners
  # are busy in parallel.
  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 30
    needs: compile
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0

      - name: Download tile binary
        uses: actions/download-artifact@v4
        with:
          name: tile-binary
          path: target/ci

      - name: Make tile executable
        run: chmod +x target/ci/tile

      - name: Add tile to PATH
        run: echo "${GITHUB_WORKSPACE}/target/ci" >> "$GITHUB_PATH"

      - name: Build
        run: tile build

  # ── Job 3 + 4: GPU benchmark suite (sharded by kernel family) ────────────────
  # Two bench jobs run in parallel — one for the `ffai` family (attention/MLP
  # inference kernels) and one for the `mlx` family (MLX reference comparisons).
  # `--match-group` narrows each shard to only its family so both finish faster
  # than a single sequential run.
  #
  # Each shard only runs when its kernel family was the sole thing modified
  # (no other crates or Rust files touched). On workflow_dispatch both shards
  # always run so a manual trigger can force a full bench.
  bench:
    name: Bench (${{ matrix.family }})
    runs-on: macos-latest
    timeout-minutes: 60
    needs: [compile, changes]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        needs.changes.outputs.other == 'false' &&
        (
          (matrix.family == 'ffai' && needs.changes.outputs.ffai == 'true') ||
          (matrix.family == 'mlx'  && needs.changes.outputs.mlx  == 'true')
        )
      )
    strategy:
      fail-fast: false
      matrix:
        family: [ffai, mlx]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0

      - name: Download tile binary
        uses: actions/download-artifact@v4
        with:
          name: tile-binary
          path: target/ci

      - name: Make tile executable
        run: chmod +x target/ci/tile

      - name: Add tile to PATH
        run: echo "${GITHUB_WORKSPACE}/target/ci" >> "$GITHUB_PATH"

      # `--allow-dirty` is defensive — CI checks out clean, but a future
      # codegen step could mutate a tracked file.
      - name: Bench (${{ matrix.family }})
        run: tile bench -vv --allow-dirty --match-group '${{ matrix.family }}' --json /tmp/bench-${{ matrix.family }}.json

      # Snapshot this shard's bench JSON.
      - name: Snapshot bench result (${{ matrix.family }})
        run: |
          tile snap \
            --from /tmp/bench-${{ matrix.family }}.json \
            -o /tmp/bench-snapshot-${{ matrix.family }}.json \
            --note "CI shard=${{ matrix.family }} @ ${{ github.sha }} (${{ github.ref_name }})"

      - name: Upload bench shard
        uses: actions/upload-artifact@v4
        with:
          name: bench-shard-${{ matrix.family }}
          path: |
            /tmp/bench-${{ matrix.family }}.json
            /tmp/bench-snapshot-${{ matrix.family }}.json
          if-no-files-found: error

  # ── Job 5: merge shards + diff comment ───────────────────────────────────────
  # Downloads both shard JSON files, merges them into a combined bench.json,
  # snaps a unified baseline, and posts the bench-diff PR comment.
  # Only runs when both shards ran (i.e. both families were changed and bench
  # succeeded), or on a manual workflow_dispatch.
  bench-merge:
    name: Bench (merge + diff)
    runs-on: macos-latest
    timeout-minutes: 15
    needs: [bench, changes]
    if: >-
      needs.bench.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          needs.changes.outputs.other == 'false' &&
          needs.changes.outputs.ffai  == 'true'  &&
          needs.changes.outputs.mlx   == 'true'
        )
      )
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5.0.0

      - name: Download tile binary
        uses: actions/download-artifact@v4
        with:
          name: tile-binary
          path: target/ci

      - name: Make tile executable
        run: chmod +x target/ci/tile

      - name: Add tile to PATH
        run: echo "${GITHUB_WORKSPACE}/target/ci" >> "$GITHUB_PATH"

      - name: Download bench shard (ffai)
        uses: actions/download-artifact@v4
        with:
          name: bench-shard-ffai
          path: /tmp/shards/ffai

      - name: Download bench shard (mlx)
        uses: actions/download-artifact@v4
        with:
          name: bench-shard-mlx
          path: /tmp/shards/mlx

      # Merge the two shard JSON files by concatenating their `results` arrays.
      # Both files share the same `device` field (same runner pool).
      - name: Merge bench shards
        run: |
          set -euo pipefail
          FFAI=/tmp/shards/ffai/bench-ffai.json
          MLX=/tmp/shards/mlx/bench-mlx.json

          DEVICE=$(jq -r '.device' "$FFAI")
          jq -s '
            {
              device: .[0].device,
              summary: {
                total:       ([.[].summary.total]       | add),
                implemented: ([.[].summary.implemented] | add),
                correct:     ([.[].summary.correct]     | add),
                unchecked:   ([.[].summary.unchecked]   | add)
              },
              results: ([.[].results] | add)
            }
          ' "$FFAI" "$MLX" > /tmp/bench.json
          echo "Merged: $(jq '.results | length' /tmp/bench.json) results for device $DEVICE"

      # Snapshot the merged result for artifact upload.
      - name: Snapshot merged bench result
        run: |
          tile snap \
            --from /tmp/bench.json -o /tmp/bench-snapshot.json \
            --note "CI runner capture @ ${{ github.sha }} (${{ github.ref_name }})"

      - name: Upload bench snapshot
        uses: actions/upload-artifact@v4
        with:
          name: bench-snapshot
          path: /tmp/bench-snapshot.json
          if-no-files-found: error

      # Soft signal: render `tile diff` against whatever baseline matches
      # the runner's chip slug and post it as a PR comment. Never fails
      # the job — the runner chip frequently won't match any committed
      # baseline, and reviewers want a glanceable trend, not a gate.
      - name: Bench diff
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          DEVICE_NAME=$(tile device --json | jq -r '.device')
          # Same rule as `cmd::bench::chip_slug` in the Rust code:
          # lowercase, collapse non-alphanumeric runs to a single dash,
          # trim leading/trailing dashes.
          SLUG=$(printf '%s' "$DEVICE_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
          BL="baselines/${SLUG}.json"
          echo "chip='${DEVICE_NAME}' slug='${SLUG}' baseline='${BL}'"
          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"

          {
            echo "<!-- bench-diff:${SLUG} -->"
            echo "### \`tile bench\` vs \`${BL}\`"
            echo
            echo "Runner chip: \`${DEVICE_NAME}\` (slug \`${SLUG}\`) | commit \`${COMMIT_SHORT}\`"
            echo
            if [ ! -f "$BL" ]; then
              echo "_No committed baseline for this runner chip — skipping diff._"
              if ls baselines/*.json >/dev/null 2>&1; then
                echo
                echo "Available baselines: $(ls baselines/*.json | xargs -n1 basename | tr '\n' ' ')"
              fi
            else
              echo "<details>"
              echo "<summary>tile diff @ commit \`${COMMIT_SHORT}\`</summary>"
              echo
              echo '```'
              # Strip ANSI colour codes so the PR comment renders cleanly.
              # `|| true` so a regression exit code (1) doesn't kill the job.
              tile diff "$BL" /tmp/bench.json 2>&1 \
                | sed 's/\x1b\[[0-9;]*m//g' || true
              echo '```'
              echo
              echo '</details>'
            fi
          } > /tmp/bench-diff-comment.md

          echo "---- bench-diff comment body ----"
          cat /tmp/bench-diff-comment.md
          echo "---- end bench-diff comment body ----"

          # Find an existing bench-diff comment by its marker and edit it.
          # If none exists, create a new one.  This keeps PR threads clean
          # as new commits come in — one rolling comment, not a pile of them.
          #
          # Fork PRs get a read-only GITHUB_TOKEN regardless of the
          # `pull-requests: write` permission above — GitHub blocks
          # write tokens to mitigate untrusted-fork attacks. Log a
          # warning instead of failing the job; the comment body is
          # already in the step log right above.
          MARKER="<!-- bench-diff:${SLUG} -->"
          # `gh --jq` takes a jq expression but NOT `--arg` (that's a
          # jq-binary flag), so we inline the marker via shell
          # interpolation instead of `--arg marker $MARKER`. The
          # marker is a known-safe HTML comment with the runner-slug
          # in it — no shell or jq metachars to escape.
          #
          # The trailing `2>/dev/null || echo ""` makes the lookup
          # graceful: if gh hits a transient API error, a fork-PR
          # token rejection, or anything else, EXISTING_ID just ends
          # up empty and we fall through to the "post a new comment"
          # path below. Better than failing the whole Bench-diff step
          # because of a comment-dedup lookup. PR #159 first tried
          # `gh pr view --json comments | jq -r --arg marker ...`
          # which fixed the `--arg` tokenisation but introduced a
          # second failure mode (the pipe propagating jq parse errors
          # back through `set -o pipefail` on the shebang).
          EXISTING_ID=$(gh pr view "$PR_NUMBER" --json comments --jq \
            "[.comments[] | select(.body | contains(\"$MARKER\")) | .id] | first" \
            2>/dev/null || echo "")

          REPO="${{ github.repository }}"
          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing bench-diff comment #${EXISTING_ID}"
            if ! gh api "repos/${REPO}/issues/comments/${EXISTING_ID}" \
                 -X PATCH -F body=@/tmp/bench-diff-comment.md --silent; then
              echo "::warning::Could not update bench-diff comment (likely a fork PR with read-only token)."
            fi
          else
            echo "Creating new bench-diff comment"
            if ! gh pr comment "$PR_NUMBER" --body-file /tmp/bench-diff-comment.md; then
              echo "::warning::Could not post bench-diff comment (likely a fork PR with read-only token). Comment body is in this step log."
            fi
          fi
